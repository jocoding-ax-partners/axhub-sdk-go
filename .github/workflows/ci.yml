name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24.x', '1.26.x']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # actions/setup-go v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: false
      - run: go vet ./...
      - name: Conformance (42 vectors) + route parity (177)
        run: go test ./... -run 'Conformance|Regression|Operations|Coverage' -v
      - run: go test ./...
      - run: go build ./...
      - name: Example consumer smoke
        run: |
          cd examples/testapp
          go run .
