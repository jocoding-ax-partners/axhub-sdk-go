name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24.x', '1.26.x']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # actions/setup-go v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go vet ./...
      - name: Conformance (42 vectors) + route parity (177)
        run: go test ./... -run 'Conformance|Regression|Operations|Coverage' -v
      - run: go test ./...
      - run: go build ./...
      - name: Example consumer smoke
        run: |
          cd examples/testapp
          go run .
