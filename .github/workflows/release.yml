name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # actions/setup-go v6.4.0
        with:
          go-version: '1.24.x'
          cache: false
      - name: Verify SemVer release tag
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Tag must be vMAJOR.MINOR.PATCH"; exit 1; }
      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify CI succeeded on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh run list --workflow ci.yml --commit "$GITHUB_SHA" --status success --json databaseId --jq 'length')
          [ "$count" -gt 0 ] || { echo "No successful ci.yml run found for $GITHUB_SHA"; exit 1; }
      - run: go vet ./...
      - name: Conformance (42 vectors) + route parity (177)
        run: go test ./... -run 'Conformance|Regression|Operations|Coverage' -v
      - run: go test ./...
      - run: go build ./...
      - name: Example consumer smoke before release
        run: |
          cd examples/testapp
          go run .

  release:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: github-release
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # softprops/action-gh-release v3.0.1
        with:
          generate_release_notes: true

  smoke:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # actions/setup-go v6.4.0
        with:
          go-version: '1.24.x'
      - name: Install from module proxy in clean consumer
        run: |
          set -eux
          for i in $(seq 1 10); do
            if GOPROXY=proxy.golang.org go list -m "github.com/jocoding-ax-partners/axhub-sdk-go@$GITHUB_REF_NAME"; then
              break
            fi
            echo "Go module proxy not ready yet (attempt $i/10); retrying"
            sleep 30
          done
          mkdir smoke && cd smoke
          go mod init axhub-smoke
          go get "github.com/jocoding-ax-partners/axhub-sdk-go@$GITHUB_REF_NAME"
          cat > main.go <<'GO'
          package main
          import axhub "github.com/jocoding-ax-partners/axhub-sdk-go"
          func main() { _ = axhub.NewClient(axhub.Config{BaseURL: "https://api.axhub.ai"}) }
          GO
          go build .
